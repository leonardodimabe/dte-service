name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # En Linux las deps nativas de firma del motor son paquetes del sistema.
      - name: Instalar libs nativas (xmlsec/libxml2)
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxmlsec1-dev pkg-config

      # El motor (cl_dte_lib) es privado: el extra `engine` lo instala desde
      # git@v0.1.0. ENGINE_TOKEN = PAT fine-grained / deploy key con lectura a
      # cl_dte_lib (el github.token por defecto no alcanza otro repo privado).
      - name: Auth git para el repo privado del motor
        run: git config --global url."https://x-access-token:${{ secrets.ENGINE_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Instalar servicio + motor (pineado al tag)
        run: pip install -e ".[dev,engine]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Formato (ruff)
        run: ruff format --check .

      - name: Tipos (mypy)
        run: mypy

      - name: Tests (pytest)
        run: pytest -q
