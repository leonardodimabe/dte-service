services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dte
      POSTGRES_PASSWORD: dte
      POSTGRES_DB: dte_service
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    environment:
      DTE_DATABASE_URL: postgresql+psycopg://dte:dte@db:5432/dte_service
      # :? → compose falla si no están definidas (nunca arrancar con defaults).
      DTE_FERNET_KEYS: ${DTE_FERNET_KEYS:?definir DTE_FERNET_KEYS}
      DTE_ADMIN_API_KEY: ${DTE_ADMIN_API_KEY:?definir DTE_ADMIN_API_KEY (>=16 chars)}
      DTE_JWT_SECRET: ${DTE_JWT_SECRET:?definir DTE_JWT_SECRET (>=32 chars)}
      DTE_SCHEMAS_DIR: /srv/schemas
    ports:
      - "8000:8000"
    volumes:
      # Monta los XSD oficiales del SII (del motor) en el contenedor.
      - ./schemas:/srv/schemas:ro

volumes:
  pgdata:
