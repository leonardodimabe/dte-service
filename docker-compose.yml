services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dte
      POSTGRES_PASSWORD: dte
      POSTGRES_DB: dte_service
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # 'pg_isready' marca healthy recién cuando acepta conexiones; así el api
      # no corre 'alembic upgrade' contra una BD que aún no levanta.
      test: ["CMD-SHELL", "pg_isready -U dte -d dte_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DTE_DATABASE_URL: postgresql+psycopg://dte:dte@db:5432/dte_service
      # :? → compose falla si no están definidas (nunca arrancar con defaults).
      DTE_FERNET_KEYS: ${DTE_FERNET_KEYS:?definir DTE_FERNET_KEYS}
      DTE_ADMIN_API_KEY: ${DTE_ADMIN_API_KEY:?definir DTE_ADMIN_API_KEY (>=16 chars)}
      DTE_JWT_SECRET: ${DTE_JWT_SECRET:?definir DTE_JWT_SECRET (>=32 chars)}
      # Demo sobre HTTP → cookie sin Secure. En prod (TLS delante) poner true.
      DTE_COOKIE_SECURE: ${DTE_COOKIE_SECURE:-false}
      # Superadmin sembrado al arranque (para entrar al portal). Si va vacío,
      # no se siembra → el portal quedaría sin login.
      DTE_SUPERADMIN_EMAIL: ${DTE_SUPERADMIN_EMAIL:-}
      DTE_SUPERADMIN_PASSWORD: ${DTE_SUPERADMIN_PASSWORD:-}
      DTE_SCHEMAS_DIR: /srv/schemas
    ports:
      # Para clientes máquina (Odoo). El portal entra por el servicio 'web'.
      - "8000:8000"
    volumes:
      # Monta los XSD oficiales del SII (del motor) en el contenedor.
      - ./schemas:/srv/schemas:ro

  # Ingress del portal: sirve la SPA y proxya /api/* al API (mismo sitio).
  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
