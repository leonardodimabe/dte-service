# Ingress del portal (mismo sitio): sirve la SPA y reenvía /api/* al backend.
# La cookie de sesión viaja como SameSite=Strict porque navegador y API
# comparten origen. Los clientes máquina (Odoo) usan el API directo, no esto.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API del portal bajo /api → backend (se quita el prefijo con el slash final).
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: fallback a index.html para el routing del lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
